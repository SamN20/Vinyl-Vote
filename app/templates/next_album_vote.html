{% extends "base.html" %}
{% block title %}Next Album Vote{% endblock %}

{% block content %}
<h2 class="next-vote-title">Pick Next Week's Album</h2>
<form method="post" class="next-vote-form" id="next-vote-form">
  <div class="next-vote-grid">
    {% for album in albums %}
    <label class="next-vote-card{% if selected==album.id %} selected{% endif %}" data-album-id="{{ album.id }}">
      <input type="radio" name="album_id" value="{{ album.id }}" {% if selected==album.id %}checked{% endif %} required>
      <div class="next-vote-cover-wrap">
        <img src="{{ album.cover_url }}" alt="{{ album.title }}" class="next-vote-cover">
        <span class="next-vote-checkmark">&#10003;</span>
      </div>
      <div class="next-vote-info">
        <!-- <div class="next-vote-order">{{ album.queue_order }}</div> -->
        <div class="next-vote-title-main">{{ album.title }}</div>
        <div class="next-vote-artist">{{ album.artist }}</div>
      </div>
    </label>
    {% endfor %}
  </div>
  {% if not albums %}
    <p>No albums queued.</p>
  {% else %}
    <button type="submit" class="next-vote-cta">Submit Choice</button>
  {% endif %}
</form>
<script>
  // Modern card selection: clicking a card selects it visually and sets the radio
  document.querySelectorAll('.next-vote-card').forEach(card => {
    card.addEventListener('click', function(e) {
      // Prevent double toggling if clicking the radio itself
      if (e.target.tagName === 'INPUT') return;
      document.querySelectorAll('.next-vote-card').forEach(c => c.classList.remove('selected'));
      this.classList.add('selected');
      this.querySelector('input[type="radio"]').checked = true;
    });
  });
</script>
{% endblock %}

{% extends "base.html" %}
{% block title %}Page Not Found{% endblock %}

{% block content %}
<section class="error-page" style="display: flex; align-items: center; justify-content: center; min-height: 80vh; background: linear-gradient(135deg, #1DB954, #1ed760);">
  <div class="form-card pop-in" style="animation-delay: 0.2s; padding: 40px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); text-align: center;">
    <div style="margin-bottom: 20px;">
      <!-- Fancy 404 Icon -->
      <svg width="120" height="120" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="pop-in" style="animation-delay: 0.3s;">
        <path d="M9 9l6 6"></path>
        <path d="M9 15l6-6"></path>
      </svg>
    </div>
    <h1 class="pop-in" style="animation-delay: 0.4s; font-size: 3em; margin-bottom: 16px;">404</h1>
    <h2 class="pop-in" style="animation-delay: 0.5s; margin-bottom: 20px;">Page Not Found</h2>
    <p class="pop-in" style="animation-delay: 0.6s; font-size: 1.1em; margin-bottom: 30px;">
      The page you're looking for doesn't exist.
    </p>
    <a href="{{ url_for('admin.manage_albums') }}" class="btn pop-in" style="animation-delay: 0.7s; padding: 12px 24px; display: inline-block; padding: 12px 24px; font-size: 1em; background: var(--accent); color: #fff; border-radius: 6px; text-decoration: none; box-shadow: 0 4px 8px rgba(0,0,0,0.2); transition: background 0.3s;">
      Return Home
    </a>
  </div>
</section>
{% endblock %}

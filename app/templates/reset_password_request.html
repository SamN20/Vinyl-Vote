{% extends "base.html" %}
{% block title %}Reset Password Request{% endblock %}
{% block content %}
<div class="form-card pop-in" style="animation-delay: 0.1s;">
  <h2 class="pop-in" style="animation-delay: 0.2s;">Reset Password</h2>
  <form method="POST">
    {{ form.hidden_tag() }}
    <label for="username" class="pop-in" style="animation-delay: 0.3s">{{ form.username.label }}</label>
    {{ form.username(class_='input-field pop-in', style='animation-delay: 0.3s', placeholder='Enter your username or email') }}
    <button type="submit" class="pop-in" style="animation-delay: 0.5s;">Submit Request</button>
  </form>
  <p class="form-footer pop-in" style="animation-delay: 0.6s;">
    <a href="{{ url_for('user.login') }}">Back to Login</a>
  </p>
</div>
{% endblock %}
